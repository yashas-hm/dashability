name: dashability
description: >-
  Runtime observability for Flutter apps. Monitors performance, detects
  anomalies, and exposes tools via MCP for AI agents.
version: 1.0.2
repository: https://github.com/yashas-hm/dashability

environment:
  sdk: ^3.11.1

executables:
  dashability: dashability

dependencies:
  args: ^2.6.0
  appium_driver: ^0.7.1
  dart_mcp: ^0.5.0
  vm_service: ^15.0.2
  stream_channel: ^2.1.4
  web_socket_channel: ^3.0.2

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.0
