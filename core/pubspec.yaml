name: dashability
description: >-
  AI Observability Layer for Flutter Apps. Connects to running Flutter apps
  via VM Service, monitors performance and errors in real-time, detects
  anomalies, and exposes observation and action tools via MCP.
version: 0.1.0
repository: https://github.com/yashas-hm/dashability

environment:
  sdk: ^3.11.1

executables:
  dashability: dashability

dependencies:
  args: ^2.6.0
  appium_driver: ^0.7.1
  dart_mcp: ^0.5.0
  vm_service: ^15.0.2
  web_socket_channel: ^3.0.2

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.0
